<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Project Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI, Arial, sans-serif;}
    body{background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;}
    .container{width:100%;max-width:1200px;background:rgba(0,0,0,0.85);border-radius:20px;padding:20px;box-shadow:0 15px 40px rgba(0,0,0,0.6);margin-bottom:30px;}
    h2{text-align:center;margin-bottom:20px;}
    table{width:100%;border-collapse:collapse;}
    th, td{padding:12px;text-align:left;border-bottom:1px solid #444;}
    th{background:#1f2937;}
    tr:hover{background:rgba(255,255,255,0.05);}
    button.manage{background:#2563eb;color:white;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;}
    button.manage:hover{background:#1d4ed8;}
    button.add{background:#16a34a;margin-bottom:10px;}
    button.add:hover{background:#15803d;}
  </style>
</head>
<body>
<div class="container">
  <h2>📂 Admin - Project Management</h2>
  <button class="manage add" onclick="addProject()">➕ Add New Project</button>
  <table id="projectsTable">
    <thead>
      <tr>
        <th>ID</th>
        <th>Project Name</th>
        <th>Assigned To</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <!-- Projects will be dynamically generated -->
    </tbody>
  </table>
</div>
<script>
// Sample projects data
let projects=[
  {id:1,name:'Student Portal',assigned:'John Doe',status:'In Progress'},
  {id:2,name:'SPMS System',assigned:'Alice Smith',status:'Completed'},
  {id:3,name:'Login Module',assigned:'Bob Mentor',status:'Pending'}
];

const tbody=document.getElementById('projectsTable').querySelector('tbody');

function renderProjects(){
  tbody.innerHTML='';
  projects.forEach(project=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${project.id}</td>
      <td>${project.name}</td>
      <td>${project.assigned}</td>
      <td>${project.status}</td>
      <td>
        <button class='manage' onclick='editProject(${project.id})'>Edit</button>
        <button class='manage' onclick='deleteProject(${project.id})'>Delete</button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

function addProject(){
  const name=prompt('Project Name:');
  const assigned=prompt('Assigned To:');
  const status=prompt('Status (Pending/In Progress/Completed):');
  if(name && assigned && status){
    const id=projects.length>0?projects[projects.length-1].id+1:1;
    projects.push({id,name,assigned,status});
    renderProjects();
  }
}

function editProject(id){
  const project=projects.find(p=>p.id===id);
  if(!project) return;
  const name=prompt('Project Name:',project.name);
  const assigned=prompt('Assigned To:',project.assigned);
  const status=prompt('Status:',project.status);
  if(name) project.name=name;
  if(assigned) project.assigned=assigned;
  if(status) project.status=status;
  renderProjects();
}

function deleteProject(id){
  if(confirm('Are you sure to delete this project?')){
    const index=projects.findIndex(p=>p.id===id);
    if(index!==-1){projects.splice(index,1); renderProjects();}
  }
}

renderProjects();
</script>
</body>
</html>
