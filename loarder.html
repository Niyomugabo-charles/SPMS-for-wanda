<!-- loader-component.html -->
<div id="loader-overlay">
  <div class="spinner"></div>
</div>

<style>
#loader-overlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: linear-gradient(135deg, #a76f07, #060707);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  opacity:0;
  pointer-events:none;
  transition: opacity 0.5s ease;
}
#loader-overlay.show {
  opacity:1;
  pointer-events:all;
}
.spinner {
  border:8px solid rgba(255,255,255,0.3);
  border-top:8px solid #fff;
  border-radius:50%;
  width:70px;
  height:70px;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
</style>

<script>
const loader = document.getElementById('loader-overlay');
window.addEventListener('beforeunload', () => loader.classList.add('show'));
window.addEventListener('load', () => loader.classList.remove('show'));
document.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', function(e){
        const url = this.href;
        if(!url.includes(window.location.hostname)) return;
        e.preventDefault();
        loader.classList.add('show');
        setTimeout(()=> window.location.href = url, 500);
    });
});
</script>
